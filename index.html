<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Golf Score" />
  <title>Golf Score</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; overflow-x: hidden; }
    select option { background: #1e293b; color: #e2e8f0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

const CLUBS = ["1W", "3W", "5W", "7W", "UT", "6I", "7I", "8I", "9I", "PW", "AW", "SW", "PT"];
const RATINGS = ["○", "△", "×"];
const RC = { "○": "#4ade80", "△": "#facc15", "×": "#f87171" };
const PRESETS = [{ name: "KOSHIGAYA GOLF CLUB", pars: [4,4,3,5,4,3,4,5,4,4,5,3,4,4,3,4,5,4] }];
const SKEY = "golf_rounds";

function newRound(p) {
  const pr = p || PRESETS[0];
  return { id: Date.now(), courseName: pr.name, date: new Date().toISOString().split("T")[0], pars: [...pr.pars], holes: Array.from({ length: 18 }, () => ({ shots: [], parOn: false, putts: 0 })) };
}
function loadRounds() { try { const r = localStorage.getItem(SKEY); return r ? JSON.parse(r) : []; } catch { return []; } }
function saveRounds(rounds) { try { localStorage.setItem(SKEY, JSON.stringify(rounds)); } catch {} }
const hs = (h) => h.shots.length + (h.putts || 0);

function calcParAvg(holes, pars) {
  return [3,4,5].map(par => {
    const m = holes.map((h,i) => ({h, par: pars[i]})).filter(x => x.par === par && hs(x.h) > 0);
    const cnt = m.length;
    const avg = cnt > 0 ? (m.reduce((s,x) => s + hs(x.h), 0) / cnt).toFixed(2) : null;
    const diff = avg !== null ? (Number(avg) - par).toFixed(2) : null;
    const aH = m.filter(x => x.h.shots.length > 0);
    const avgA = aH.length > 0 ? (aH.reduce((s,x) => s + x.h.shots.length, 0) / aH.length).toFixed(1) : null;
    const pH = m.filter(x => x.h.putts > 0);
    const avgP = pH.length > 0 ? (pH.reduce((s,x) => s + x.h.putts, 0) / pH.length).toFixed(1) : null;
    return { par, avg, diff, count: cnt, avgApproach: avgA, avgPutts: avgP };
  });
}

function ratingStats(shots) {
  const total = shots.length;
  const counts = RATINGS.reduce((acc,r) => { acc[r] = shots.filter(s => s.rating === r).length; return acc; }, {});
  return { total, counts };
}

function ShotRow({ shot, index, onChange, onRemove }) {
  if (shot.isPenaltyShot) {
    return (
      <div style={{ display:"flex", alignItems:"center", gap:"0.5rem", padding:"0.35rem 0.5rem", background:"rgba(248,113,113,0.07)", border:"1px dashed rgba(248,113,113,0.3)", borderRadius:"8px", marginBottom:"0.3rem" }}>
        <span style={{ color:"#9ca3af", fontWeight:600, minWidth:"1.2rem", fontSize:"0.75rem" }}>{index+1}</span>
        <span style={{ color:"#f87171", fontWeight:700, flex:1, fontSize:"0.75rem" }}>罰打（自動追加）</span>
        <button onClick={onRemove} style={{ background:"none", border:"none", color:"#6b7280", cursor:"pointer", fontSize:"1rem" }}>x</button>
      </div>
    );
  }
  const SS = { background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:"6px", color:"#e2e8f0", padding:"0.25rem 0.3rem", fontSize:"0.78rem", outline:"none", cursor:"pointer" };
  return (
    <div style={{ padding:"0.5rem 0.6rem", background:"rgba(255,255,255,0.04)", borderRadius:"8px", marginBottom:"0.4rem" }}>
      <div style={{ display:"flex", alignItems:"center", gap:"0.35rem", marginBottom:"0.35rem" }}>
        <span style={{ color:"#9ca3af", fontWeight:600, fontSize:"0.75rem", minWidth:"1.1rem" }}>{index+1}</span>
        <select value={shot.club} onChange={e => onChange({ ...shot, club: e.target.value })} style={{ ...SS, flex:1 }}>
          <option value="">番手</option>
          {CLUBS.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <button onClick={() => onChange({ ...shot, ob: !shot.ob })} style={{ padding:"0.2rem 0.5rem", border:shot.ob ? "2px solid #f87171" : "1px solid rgba(255,255,255,0.15)", borderRadius:"5px", background:shot.ob ? "#f8717122" : "transparent", color:shot.ob ? "#f87171" : "#6b7280", cursor:"pointer", fontSize:"0.65rem", fontWeight:700 }}>OB</button>
        <button onClick={() => onChange({ ...shot, penalty: !shot.penalty })} style={{ padding:"0.2rem 0.5rem", border:shot.penalty ? "2px solid #facc15" : "1px solid rgba(255,255,255,0.15)", borderRadius:"5px", background:shot.penalty ? "#facc1522" : "transparent", color:shot.penalty ? "#facc15" : "#6b7280", cursor:"pointer", fontSize:"0.65rem", fontWeight:700 }}>PEN</button>
        <button onClick={onRemove} style={{ background:"none", border:"none", color:"#6b7280", cursor:"pointer", fontSize:"1rem" }}>x</button>
      </div>
      <div style={{ display:"flex", gap:"0.4rem" }}>
        {RATINGS.map(r => (
          <button key={r} onClick={() => onChange({ ...shot, rating: shot.rating === r ? "" : r })} style={{ flex:1, padding:"0.45rem 0", border:shot.rating === r ? "2px solid "+RC[r] : "1px solid rgba(255,255,255,0.15)", borderRadius:"8px", background:shot.rating === r ? RC[r]+"22" : "transparent", color:shot.rating === r ? RC[r] : "#6b7280", cursor:"pointer", fontSize:"1rem", fontWeight:700 }}>{r}</button>
        ))}
      </div>
    </div>
  );
}

function HoleCard({ hole, holeNum, par, onParChange, onShotsChange, onHoleChange, isActive, onClick }) {
  const score = hs(hole);
  const diff = score - par;
  const dl = diff === 0 ? "E" : diff > 0 ? "+"+diff : ""+diff;
  const dc = diff < 0 ? "#c084fc" : diff === 0 ? "#60a5fa" : diff === 1 ? "#4ade80" : "#f87171";
  const SS = { background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:"6px", color:"#e2e8f0", padding:"0.25rem 0.3rem", fontSize:"0.78rem", outline:"none", cursor:"pointer" };

  const addShot = () => onShotsChange([...hole.shots, { club:"", rating:"", ob:false, penalty:false, isPenaltyShot:false }]);
  const updateShot = (i, ns) => {
    const prev = hole.shots[i];
    let shots = hole.shots.map((sh,idx) => idx === i ? ns : sh);
    const added = (!prev.ob && ns.ob) || (!prev.penalty && ns.penalty);
    const removed = (prev.ob && !ns.ob) || (prev.penalty && !ns.penalty);
    if (added) shots = [...shots.slice(0,i+1), { club:"", rating:"", ob:false, penalty:false, isPenaltyShot:true }, ...shots.slice(i+1)];
    else if (removed && shots[i+1] && shots[i+1].isPenaltyShot) shots = shots.filter((_,idx) => idx !== i+1);
    onShotsChange(shots);
  };
  const removeShot = (i) => onShotsChange(hole.shots.filter((_,idx) => idx !== i));
  const hNum = String(holeNum).padStart(2,"0");

  return (
    <div onClick={!isActive ? onClick : undefined} style={{ background:isActive?"rgba(255,255,255,0.07)":"rgba(255,255,255,0.03)", border:isActive?"1px solid #63b3ed":"1px solid #334155", borderRadius:"14px", marginBottom:"0.6rem", overflow:"hidden", cursor:isActive?"default":"pointer" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0.7rem 1rem", background:isActive?"rgba(99,179,237,0.1)":"transparent" }} onClick={isActive ? onClick : undefined}>
        <div style={{ display:"flex", alignItems:"center", gap:"0.5rem", minWidth:0, flex:1 }}>
          <span style={{ fontSize:"1rem", color:"#e2e8f0", fontWeight:700, whiteSpace:"nowrap" }}>HOLE {hNum}</span>
          <div style={{ display:"flex", alignItems:"center", gap:"0.3rem", flexShrink:0 }}>
            <span style={{ color:"#6b7280", fontSize:"0.72rem" }}>PAR</span>
            <select value={par} onChange={e => { e.stopPropagation(); onParChange(Number(e.target.value)); }} onClick={e => e.stopPropagation()} style={{ ...SS, width:"2.8rem", textAlign:"center" }}>
              {[3,4,5].map(p => <option key={p} value={p}>{p}</option>)}
            </select>
            {score > 0 && <span style={{ fontSize:"1rem", color:dc, fontWeight:700 }}>{score}</span>}
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:"0.4rem", flexShrink:0 }}>
          {score > 0 && <span style={{ fontSize:"0.8rem", fontWeight:700, color:dc, background:dc+"22", padding:"0.15rem 0.4rem", borderRadius:"5px" }}>{dl}</span>}
          {hole.parOn && <span style={{ fontSize:"0.65rem", color:"#63b3ed", background:"#1e40af44", border:"1px solid #63b3ed", padding:"0.1rem 0.35rem", borderRadius:"4px" }}>GIR</span>}
          {hole.putts > 0 && <span style={{ fontSize:"0.65rem", color:"#a78bfa", background:"#4c1d9544", border:"1px solid #a78bfa", padding:"0.1rem 0.35rem", borderRadius:"4px" }}>{hole.putts}PT</span>}
          <span style={{ color:"#6b7280", fontSize:"0.8rem" }}>{isActive?"▲":"▼"}</span>
        </div>
      </div>
      {isActive && (
        <div style={{ padding:"0.5rem 0.8rem 0.8rem" }} onClick={e => e.stopPropagation()}>
          {hole.shots.map((s,i) => <ShotRow key={i} shot={s} index={i} onChange={ns => updateShot(i,ns)} onRemove={() => removeShot(i)} />)}
          <button onClick={addShot} style={{ width:"100%", padding:"0.5rem", marginTop:"0.3rem", background:"rgba(99,179,237,0.1)", border:"1px dashed rgba(99,179,237,0.4)", borderRadius:"8px", color:"#63b3ed", cursor:"pointer", fontSize:"0.82rem", fontWeight:600 }}>+ 打数を追加</button>
          <div style={{ display:"flex", alignItems:"center", gap:"0.7rem", marginTop:"0.8rem", padding:"0.6rem 0.7rem", background:"rgba(255,255,255,0.03)", borderRadius:"10px", border:"1px solid rgba(255,255,255,0.08)" }}>
            <button onClick={() => onHoleChange({ ...hole, parOn: !hole.parOn })} style={{ flex:1, padding:"0.4rem 0", border:hole.parOn ? "2px solid #4ade80" : "1px solid rgba(255,255,255,0.15)", borderRadius:"8px", background:hole.parOn ? "rgba(74,222,128,0.15)" : "transparent", color:hole.parOn ? "#4ade80" : "#6b7280", cursor:"pointer", fontSize:"0.78rem", fontWeight:700 }}>{hole.parOn ? "GIR ON" : "GIR OFF"}</button>
            <div style={{ display:"flex", alignItems:"center", gap:"0.4rem" }}>
              <span style={{ color:"#9ca3af", fontSize:"0.72rem", whiteSpace:"nowrap" }}>パット数</span>
              <button onClick={() => onHoleChange({ ...hole, putts: Math.max(0,(hole.putts||0)-1) })} style={{ width:"1.6rem", height:"1.6rem", borderRadius:"50%", border:"1px solid rgba(255,255,255,0.15)", background:"rgba(255,255,255,0.06)", color:"#e2e8f0", cursor:"pointer", fontSize:"0.9rem" }}>-</button>
              <span style={{ fontSize:"1.4rem", color:"#e2e8f0", minWidth:"1.5rem", textAlign:"center", fontWeight:700 }}>{hole.putts||0}</span>
              <button onClick={() => onHoleChange({ ...hole, putts: (hole.putts||0)+1 })} style={{ width:"1.6rem", height:"1.6rem", borderRadius:"50%", border:"1px solid rgba(255,255,255,0.15)", background:"rgba(255,255,255,0.06)", color:"#e2e8f0", cursor:"pointer", fontSize:"0.9rem" }}>+</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ScoreCard({ holes, pars }) {
  const total = holes.reduce((s,h) => s+hs(h), 0);
  const totalPar = pars.reduce((a,b) => a+b, 0);
  const diff = total - totalPar;
  const front = holes.slice(0,9).reduce((s,h) => s+hs(h), 0);
  const frontPar = pars.slice(0,9).reduce((a,b) => a+b, 0);
  const back = holes.slice(9).reduce((s,h) => s+hs(h), 0);
  const backPar = pars.slice(9).reduce((a,b) => a+b, 0);
  const frontDiff = front - frontPar;
  const backDiff = back - backPar;
  return (
    <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"0.8rem", marginBottom:"1.2rem" }}>
      <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.6rem" }}>SCORE CARD</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(19, 1fr)", gap:"0.1rem" }}>
        {holes.map((h,i) => {
          const s = hs(h); const d = s - pars[i];
          const c = s===0 ? "#4b5563" : d<0 ? "#c084fc" : d===0 ? "#60a5fa" : d===1 ? "#4ade80" : "#f87171";
          return (<div key={i} style={{ textAlign:"center" }}><div style={{ color:"#6b7280", fontSize:"0.5rem" }}>{i+1}</div><div style={{ color:c, fontWeight:700, fontSize:"0.8rem" }}>{s||"-"}</div></div>);
        })}
        <div style={{ textAlign:"center", borderLeft:"1px solid rgba(255,255,255,0.1)" }}>
          <div style={{ color:"#6b7280", fontSize:"0.5rem" }}>計</div>
          <div style={{ color:"#e2e8f0", fontWeight:700, fontSize:"0.8rem" }}>{total||"-"}</div>
        </div>
      </div>
      {total > 0 && (
        <div style={{ marginTop:"0.6rem" }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0.5rem", marginBottom:"0.5rem" }}>
            {[["前半",front,frontDiff,frontPar],["後半",back,backDiff,backPar],["合計",total,diff,totalPar]].map(([label,score,d,par]) => (
              <div key={label} style={{ textAlign:"center", background:"rgba(255,255,255,0.03)", borderRadius:"8px", padding:"0.4rem 0.2rem" }}>
                <div style={{ color:"#6b7280", fontSize:"0.6rem", marginBottom:"0.2rem" }}>{label} Par{par}</div>
                <div style={{ color:"#e2e8f0", fontWeight:700, fontSize:"1.3rem" }}>{score||"-"}</div>
                {score > 0 && <div style={{ fontSize:"0.65rem", fontWeight:700, color:d<0?"#c084fc":d===0?"#60a5fa":d===1?"#4ade80":"#f87171" }}>{d===0?"Even":d>0?"+"+d:""+d}</div>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ParAvgBlock({ parAvgs }) {
  return (
    <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
      <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.7rem" }}>Par別平均スコア</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0.5rem" }}>
        {parAvgs.map(({ par, avg, diff, count, avgApproach, avgPutts }) => {
          const dn = diff !== null ? Number(diff) : null;
          const color = dn===null ? "#4b5563" : dn<0 ? "#4ade80" : dn===0 ? "#60a5fa" : "#f87171";
          return (
            <div key={par} style={{ textAlign:"center", background:"rgba(255,255,255,0.03)", borderRadius:"10px", padding:"0.7rem 0.3rem" }}>
              <div style={{ color:"#6b7280", fontSize:"0.62rem", marginBottom:"0.2rem" }}>Par {par}</div>
              <div style={{ fontSize:"1.5rem", color:avg ? "#e2e8f0" : "#4b5563", fontWeight:700 }}>{avg||"-"}</div>
              {diff !== null && <div style={{ fontSize:"0.65rem", color, fontWeight:700, marginBottom:"0.4rem" }}>{dn>=0 ? "+"+diff : diff}</div>}
              <div style={{ borderTop:"1px solid rgba(255,255,255,0.06)", paddingTop:"0.4rem" }}>
                <div style={{ fontSize:"0.58rem", color:"#6b7280" }}><span style={{ color:"#63b3ed" }}>打数 </span><span style={{ color:"#e2e8f0", fontWeight:700 }}>{avgApproach||"-"}</span></div>
                <div style={{ fontSize:"0.58rem", color:"#6b7280" }}><span style={{ color:"#a78bfa" }}>パット </span><span style={{ color:"#e2e8f0", fontWeight:700 }}>{avgPutts||"-"}</span></div>
              </div>
              <div style={{ fontSize:"0.55rem", color:"#6b7280", marginTop:"0.3rem" }}>{count}ホール</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RatingBarBlock({ counts, total, label }) {
  return (
    <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
      <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.7rem" }}>{label}</div>
      {total === 0 ? (
        <div style={{ color:"#4b5563", fontSize:"0.8rem", textAlign:"center" }}>データなし</div>
      ) : (
        <div style={{ display:"flex", gap:"0.5rem" }}>
          {RATINGS.map(r => {
            const pct = Math.round((counts[r] / total) * 100);
            return (
              <div key={r} style={{ flex:1, textAlign:"center", background:"rgba(255,255,255,0.03)", borderRadius:"10px", padding:"0.6rem 0.2rem" }}>
                <div style={{ color:RC[r], fontSize:"1.1rem", marginBottom:"0.2rem" }}>{r}</div>
                <div style={{ fontSize:"1.4rem", color:RC[r], fontWeight:700 }}>{counts[r]}</div>
                <div style={{ fontSize:"0.65rem", color:RC[r], opacity:0.8 }}>{pct}%</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function HistoryList({ rounds, onSelect, onDelete }) {
  if (rounds.length === 0) return <div style={{ textAlign:"center", color:"#6b7280", padding:"3rem 0" }}>保存済みのラウンドはありません</div>;
  return (
    <div>
      {[...rounds].reverse().map(r => {
        const total = r.holes.reduce((s,h) => s+hs(h), 0);
        const totalPar = r.pars.reduce((a,b) => a+b, 0);
        const diff = total - totalPar;
        return (
          <div key={r.id} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:"14px", padding:"0.9rem 1rem", marginBottom:"0.6rem", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div onClick={() => onSelect(r)} style={{ flex:1, cursor:"pointer" }}>
              <div style={{ fontWeight:700, fontSize:"0.9rem", color:"#e2e8f0", marginBottom:"0.2rem" }}>{r.courseName||"(ゴルフ場名なし)"}</div>
              <div style={{ fontSize:"0.75rem", color:"#9ca3af" }}>{r.date}</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:"0.7rem" }}>
              {total > 0 && (
                <>
                  <span style={{ fontSize:"1.5rem", color:"#e2e8f0", fontWeight:700 }}>{total}</span>
                  <span style={{ fontSize:"0.8rem", fontWeight:700, color:diff<=0 ? "#60a5fa" : diff===1 ? "#4ade80" : "#f87171", background:diff<=0 ? "#60a5fa22" : diff===1 ? "#4ade8022" : "#f8717122", padding:"0.15rem 0.45rem", borderRadius:"5px" }}>{diff===0 ? "E" : diff>0 ? "+"+diff : ""+diff}</span>
                </>
              )}
              <button onClick={() => onDelete(r.id)} style={{ background:"none", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"6px", color:"#6b7280", cursor:"pointer", fontSize:"0.72rem", padding:"0.2rem 0.5rem" }}>削除</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TrendGraph({ rounds, activeMetric, setActiveMetric }) {
  const sorted = [...rounds].sort((a,b) => a.date.localeCompare(b.date));
  const metrics = [
    { key:"score", label:"平均スコア", color:"#63b3ed", values: sorted.map(r => r.holes.reduce((s,h) => s+hs(h), 0)) },
    { key:"parOn", label:"パーオン%", color:"#4ade80", values: sorted.map(r => { const hp = r.holes.filter(h => h.shots.length>0).length; return hp>0 ? Math.round((r.holes.filter(h => h.parOn).length/hp)*100) : 0; }) },
    { key:"bogeyOn", label:"ボギーオン%", color:"#a78bfa", values: sorted.map(r => { const hp = r.holes.filter(h => h.shots.length>0).length; return hp>0 ? Math.round((r.holes.filter((h,i) => h.shots.length===r.pars[i]-1 && hs(h)>0).length/hp)*100) : 0; }) },
    { key:"bogeyOnPlus", label:"ボギーオン以上%", color:"#38bdf8", values: sorted.map(r => { const hp = r.holes.filter(h => h.shots.length>0).length; return hp>0 ? Math.round((r.holes.filter((h,i) => (h.parOn || h.shots.length===r.pars[i]-1) && hs(h)>0).length/hp)*100) : 0; }) },
    { key:"putt", label:"総パット数", color:"#fb923c", values: sorted.map(r => r.holes.reduce((s,h) => s+(h.putts||0), 0)) },
    { key:"dbl", label:"ダブルボギー%", color:"#f87171", values: sorted.map(r => { const hp = r.holes.filter(h => hs(h)>0).length; return hp>0 ? Math.round((r.holes.filter((h,i) => hs(h)>=r.pars[i]+2).length/hp)*100) : 0; }) },
    { key:"tp", label:"3パット%", color:"#facc15", values: sorted.map(r => { const ph = r.holes.filter(h => h.putts>0).length; return ph>0 ? Math.round((r.holes.filter(h => (h.putts||0)>=3).length/ph)*100) : 0; }) },
    { key:"par3", label:"Par3平均", color:"#67e8f9", values: sorted.map(r => { const m = r.holes.map((h,i) => ({h,par:r.pars[i]})).filter(x => x.par===3 && hs(x.h)>0); return m.length>0 ? parseFloat((m.reduce((s,x) => s+hs(x.h),0)/m.length).toFixed(2)) : 0; }) },
    { key:"par4", label:"Par4平均", color:"#86efac", values: sorted.map(r => { const m = r.holes.map((h,i) => ({h,par:r.pars[i]})).filter(x => x.par===4 && hs(x.h)>0); return m.length>0 ? parseFloat((m.reduce((s,x) => s+hs(x.h),0)/m.length).toFixed(2)) : 0; }) },
    { key:"par5", label:"Par5平均", color:"#fca5a5", values: sorted.map(r => { const m = r.holes.map((h,i) => ({h,par:r.pars[i]})).filter(x => x.par===5 && hs(x.h)>0); return m.length>0 ? parseFloat((m.reduce((s,x) => s+hs(x.h),0)/m.length).toFixed(2)) : 0; }) },
  ];
  const m = metrics[activeMetric] || metrics[0];
  const minV = Math.min(...m.values);
  const maxV = Math.max(...m.values);
  const range = maxV - minV || 1;
  return (
    <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginTop:"1rem" }}>
      <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.8rem" }}>推移グラフ</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:"0.3rem", marginBottom:"0.8rem" }}>
        {metrics.map((met,idx) => (
          <button key={met.key} onClick={() => setActiveMetric(idx)} style={{ padding:"0.2rem 0.5rem", borderRadius:"12px", fontSize:"0.65rem", fontWeight:700, cursor:"pointer", background:activeMetric===idx ? met.color+"33" : "transparent", border:activeMetric===idx ? "1px solid "+met.color : "1px solid rgba(255,255,255,0.15)", color:activeMetric===idx ? met.color : "#6b7280" }}>{met.label}</button>
        ))}
      </div>
      <div style={{ position:"relative", height:"140px" }}>
        {m.values.map((v,i) => {
          const pct = 1 - (v - minV) / range;
          const left = sorted.length === 1 ? 50 : (i / (sorted.length-1)) * 100;
          const top = pct * 90;
          return (
            <div key={i} style={{ position:"absolute", left:left+"%", top:top+"px", transform:"translateX(-50%)" }}>
              <div style={{ width:"8px", height:"8px", borderRadius:"50%", background:m.color, margin:"0 auto" }} />
              <div style={{ fontSize:"0.6rem", color:m.color, textAlign:"center", marginTop:"2px", whiteSpace:"nowrap" }}>{v}</div>
              <div style={{ fontSize:"0.55rem", color:"#6b7280", textAlign:"center", whiteSpace:"nowrap" }}>{sorted[i].date.slice(5)}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GolfApp() {
  const [rounds, setRounds] = useState(() => loadRounds());
  const [current, setCurrent] = useState(() => { const s = loadRounds(); return s.length>0 ? s[s.length-1] : newRound(); });
  const [activeHole, setActiveHole] = useState(null);
  const [view, setView] = useState("play");
  const [saveMsg, setSaveMsg] = useState("");
  const [activeMetric, setActiveMetric] = useState(0);

  useEffect(() => {
    const updated = rounds.some(r => r.id===current.id) ? rounds.map(r => r.id===current.id ? current : r) : [...rounds, current];
    setRounds(updated);
    saveRounds(updated);
  }, [current]);

  const handleSave = () => { setSaveMsg("保存しました"); setTimeout(() => setSaveMsg(""), 2000); };
  const handleNewRound = () => { setCurrent(newRound()); setActiveHole(null); setView("play"); };
  const handleSelectRound = (r) => { setCurrent(r); setActiveHole(null); setView("play"); };
  const handleDeleteRound = (id) => {
    const updated = rounds.filter(r => r.id!==id);
    setRounds(updated); saveRounds(updated);
    if (current.id===id) setCurrent(updated.length>0 ? updated[updated.length-1] : newRound());
  };
  const updatePar = (i,v) => setCurrent({ ...current, pars: current.pars.map((p,idx) => idx===i ? v : p) });
  const updateHole = (i,h) => setCurrent({ ...current, holes: current.holes.map((ho,idx) => idx===i ? h : ho) });

  const allShots = current.holes.flatMap(h => h.shots);
  const obCount = allShots.filter(s => s.ob).length;
  const penCount = allShots.filter(s => s.penalty).length;
  const ratingCounts = RATINGS.reduce((acc,r) => { acc[r]=allShots.filter(s => s.rating===r).length; return acc; }, {});
  const holesPlayed = current.holes.filter(h => h.shots.length>0).length;
  const parOnCount = current.holes.filter(h => h.parOn).length;
  const totalPutts = current.holes.reduce((s,h) => s+(h.putts||0), 0);
  const holesWithPutts = current.holes.filter(h => h.putts>0).length;
  const avgPutts = holesWithPutts>0 ? (totalPutts/holesWithPutts).toFixed(1) : "-";
  const parOnH = current.holes.filter(h => h.parOn && h.putts>0);
  const nonParOnH = current.holes.filter(h => !h.parOn && h.putts>0);
  const avgPuttsParOn = parOnH.length>0 ? (parOnH.reduce((s,h) => s+h.putts,0)/parOnH.length).toFixed(1) : "-";
  const avgPuttsNonParOn = nonParOnH.length>0 ? (nonParOnH.reduce((s,h) => s+h.putts,0)/nonParOnH.length).toFixed(1) : "-";
  const bogeyOnH = current.holes.filter((h,i) => h.shots.length===current.pars[i]-1 && hs(h)>0);
  const bogeyOnRate = holesPlayed>0 ? Math.round((bogeyOnH.length/holesPlayed)*100) : 0;
  const bogeyOnPlusH = current.holes.filter((h,i) => (h.parOn || h.shots.length===current.pars[i]-1) && hs(h)>0);
  const bogeyOnPlusRate = holesPlayed>0 ? Math.round((bogeyOnPlusH.length/holesPlayed)*100) : 0;
  const dblH = current.holes.filter((h,i) => hs(h)>=current.pars[i]+2);
  const dblRate = holesPlayed>0 ? Math.round((dblH.length/holesPlayed)*100) : 0;
  const tpH = current.holes.filter(h => (h.putts||0)>=3);
  const tpRate = holesWithPutts>0 ? Math.round((tpH.length/holesWithPutts)*100) : 0;
  const tee45 = current.holes.map((h,i) => current.pars[i]>=4 ? h.shots[0] : null).filter(s => s && s.rating);
  const tee45Stats = ratingStats(tee45);
  const sec45 = current.holes.map((h,i) => current.pars[i]>=4 ? h.shots[1] : null).filter(s => s && s.rating);
  const sec45Stats = ratingStats(sec45);

  const tabs = { play:"入力", summary:"集計", history:"履歴", overall:"全体" };

  const renderSummary = (holes, pars, rc, obc, penc, poc, hp, tp, hwp, ap, apGIR, apNGIR, bor, bop, dblr, tpr, tee45s, sec45s) => (
    <div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.6rem", marginBottom:"0.8rem" }}>

            <div style={{ color:"#a78bfa", fontSize:"0.68rem", fontWeight:700, marginBottom:"0.3rem" }}>総パット数</div>
            <div style={{ fontSize:"1.8rem", color:"#a78bfa", fontWeight:700 }}>{tp}</div>
          </div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0.5rem" }}>
          {[["平均パット",ap,"#e2e8f0"],["GIR時",apGIR,"#4ade80"],["非GIR時",apNGIR,"#f87171"]].map(([label,val,color]) => (
            <div key={label} style={{ textAlign:"center", background:"rgba(255,255,255,0.03)", borderRadius:"8px", padding:"0.5rem" }}>
              <div style={{ color:"#6b7280", fontSize:"0.62rem", marginBottom:"0.2rem" }}>{label}</div>
              <div style={{ fontSize:"1.3rem", color, fontWeight:700 }}>{val}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.7rem", marginBottom:"1rem" }}>
        {[["OB",obc,"#f87171"],["ペナルティ",penc,"#facc15"]].map(([label,count,color]) => (
          <div key={label} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid "+color+"33", borderRadius:"12px", padding:"0.8rem", textAlign:"center" }}>
            <div style={{ color, fontSize:"0.72rem", fontWeight:700, marginBottom:"0.3rem" }}>{label}</div>
            <div style={{ fontSize:"2rem", color, fontWeight:700 }}>{count}</div>
          </div>
        ))}
      </div>
      <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
        <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.7rem" }}>ショット評価</div>
        <div style={{ display:"flex", gap:"0.5rem" }}>
          {RATINGS.map(r => {
            const total = RATINGS.reduce((s,rr) => s+rc[rr], 0);

              <div key={r} style={{ flex:1, textAlign:"center" }}>

            );

        </div>
      </div>
      <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
        <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.7rem" }}>番手使用回数</div>
        {CLUBS.map(c => {
          const cnt = holes.reduce((s,h) => s+h.shots.filter(sh => sh.club===c).length, 0);
          if (cnt===0) return null;
          const mx = Math.max(...CLUBS.map(cc => holes.reduce((s,h) => s+h.shots.filter(sh => sh.club===cc).length, 0)));
          return (
            <div key={c} style={{ marginBottom:"0.4rem", display:"flex", alignItems:"center", gap:"0.5rem" }}>
              <span style={{ width:"2.5rem", fontSize:"0.78rem", color:"#9ca3af" }}>{c}</span>
              <div style={{ flex:1, height:"8px", background:"rgba(255,255,255,0.08)", borderRadius:"4px", overflow:"hidden" }}>
                <div style={{ width:(cnt/mx*100)+"%", height:"100%", background:"#63b3ed", borderRadius:"4px" }} />

              <span style={{ fontSize:"0.78rem", color:"#e2e8f0", width:"1.5rem", textAlign:"right" }}>{cnt}</span>

      </div>
      {(() => {
        const aShots = holes.flatMap(h => h.shots);

        if (uClubs.length===0) return null;

          <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem" }}>

            <div style={{ display:"grid", gridTemplateColumns:"2.5rem 1fr 1fr 1fr", gap:"0.3rem", marginBottom:"0.4rem" }}>

              {RATINGS.map(r => <div key={r} style={{ textAlign:"center", fontSize:"0.75rem", color:RC[r], fontWeight:700 }}>{r}</div>)}
            </div>
            {uClubs.map(c => {
              const shots = aShots.filter(s => s.club===c && s.rating);
              const tot = shots.length;

                          <div style={{ fontSize:"1rem", color:cnt>0 ? RC[r] : "#374151", fontWeight:700 }}>{cnt>0 ? cnt : "-"}</div>

      <div style={{ background:"rgba(0,0,0,0.4)", borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"1rem 1rem 0.8rem", position:"sticky", top:0, zIndex:10, boxSizing:"border-box", width:"100%" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"0.7rem" }}>
          <span style={{ fontSize:"1.3rem", letterSpacing:"0.1em", color:"#63b3ed", fontWeight:700 }}>GOLF SCORE</span>

              <button key={v} onClick={() => setView(v)} style={{ padding:"0.3rem 0.5rem", borderRadius:"20px", border:view===v ? "none" : "1px solid rgba(255,255,255,0.15)", background:view===v ? "#63b3ed" : "transparent", color:view===v ? "#0f172a" : "#9ca3af", cursor:"pointer", fontSize:"0.68rem", fontWeight:700 }}>{tabs[v]}</button>

            <div style={{ display:"flex", gap:"0.5rem", alignItems:"center" }}>

              <input type="date" value={current.date} onChange={e => setCurrent({ ...current, date: e.target.value })} style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:"8px", padding:"0.45rem 0.6rem", color:"#e2e8f0", fontSize:"0.82rem", outline:"none", colorScheme:"dark" }} />
            </div>
            <div style={{ display:"flex", gap:"0.4rem", marginTop:"0.4rem", flexWrap:"wrap" }}>
              <span style={{ color:"#6b7280", fontSize:"0.68rem", alignSelf:"center" }}>よく行くコース：</span>

              ))}
            </div>
          </>
        )}
      </div>

      <div style={{ padding:"1rem 1rem 5rem", boxSizing:"border-box", width:"100%" }}>
        {view === "play" && (
          <>
            <div style={{ display:"flex", justifyContent:"flex-end", alignItems:"center", gap:"0.7rem", marginBottom:"0.8rem" }}>
              {saveMsg && <span style={{ color:"#4ade80", fontSize:"0.78rem" }}>{saveMsg}</span>}

              <button onClick={handleNewRound} style={{ padding:"0.35rem 1rem", borderRadius:"20px", background:"rgba(99,179,237,0.1)", border:"1px solid rgba(99,179,237,0.3)", color:"#63b3ed", cursor:"pointer", fontSize:"0.78rem", fontWeight:700 }}>+ 新ラウンド</button>

                onShotsChange={shots => { const ap = shots.length<=current.pars[i]-2 && shots.length>0; updateHole(i, { ...h, shots, parOn: ap }); }}

          </div>

        {view === "history" && (

              <button onClick={handleNewRound} style={{ padding:"0.35rem 1rem", borderRadius:"20px", background:"rgba(99,179,237,0.1)", border:"1px solid rgba(99,179,237,0.3)", color:"#63b3ed", cursor:"pointer", fontSize:"0.78rem", fontWeight:700 }}>+ 新ラウンド</button>
            </div>
            <HistoryList rounds={rounds} onSelect={handleSelectRound} onDelete={handleDeleteRound} />
          </div>
        )}

        {view === "overall" && (() => {
          if (rounds.length===0) return <div style={{ textAlign:"center", color:"#6b7280", padding:"3rem 0" }}>保存済みのラウンドがありません</div>;
          const aHoles = rounds.flatMap(r => r.holes);
          const aPars = rounds.flatMap(r => r.pars);
          const aShots = aHoles.flatMap(h => h.shots);
          const tR = rounds.length;
          const tScore = rounds.reduce((s,r) => s+r.holes.reduce((ss,h) => ss+hs(h),0), 0);
          const tPar = rounds.reduce((s,r) => s+r.pars.reduce((a,b) => a+b,0), 0);
          const avgS = (tScore/tR).toFixed(1);
          const avgD = ((tScore-tPar)/tR).toFixed(1);
          const tOB = aShots.filter(s => s.ob).length;
          const tPen = aShots.filter(s => s.penalty).length;
          const tParOn = aHoles.filter(h => h.parOn).length;
          const tHP = aHoles.filter(h => h.shots.length>0).length;
          const poPct = tHP>0 ? Math.round((tParOn/tHP)*100) : 0;
          const tPutts = aHoles.reduce((s,h) => s+(h.putts||0), 0);
          const aHWP = aHoles.filter(h => h.putts>0);
          const avgPA = aHWP.length>0 ? (aHWP.reduce((s,h) => s+h.putts,0)/aHWP.length).toFixed(1) : "-";
          const poH = aHoles.filter(h => h.parOn && h.putts>0);
          const npoH = aHoles.filter(h => !h.parOn && h.putts>0);
          const avgPGIR = poH.length>0 ? (poH.reduce((s,h) => s+h.putts,0)/poH.length).toFixed(1) : "-";
          const avgPNGIR = npoH.length>0 ? (npoH.reduce((s,h) => s+h.putts,0)/npoH.length).toFixed(1) : "-";
          const aRC = RATINGS.reduce((acc,r) => { acc[r]=aShots.filter(s => s.rating===r).length; return acc; }, {});
          const aBor = aHoles.filter((h,i) => h.shots.length===aPars[i]-1 && hs(h)>0).length;
          const aBop = aHoles.filter((h,i) => (h.parOn || h.shots.length===aPars[i]-1) && hs(h)>0).length;
          const aDbl = aHoles.filter((h,i) => hs(h)>=aPars[i]+2).length;
          const aTp = aHoles.filter(h => (h.putts||0)>=3).length;
          const aborR = tHP>0 ? Math.round((aBor/tHP)*100) : 0;
          const abopR = tHP>0 ? Math.round((aBop/tHP)*100) : 0;
          const adblR = tHP>0 ? Math.round((aDbl/tHP)*100) : 0;
          const atpR = aHWP.length>0 ? Math.round((aTp/aHWP.length)*100) : 0;
          const atee45 = aHoles.map((h,i) => aPars[i]>=4 ? h.shots[0] : null).filter(s => s && s.rating);
          const atee45s = ratingStats(atee45);
          const asec45 = aHoles.map((h,i) => aPars[i]>=4 ? h.shots[1] : null).filter(s => s && s.rating);
          const asec45s = ratingStats(asec45);
          return (
            <div>
              <div style={{ color:"#9ca3af", fontSize:"0.78rem", marginBottom:"1rem" }}>{tR}ラウンド分の累計データ</div>
              <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
                <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.7rem" }}>スコアサマリー</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0.5rem" }}>
                  {[["平均スコア",avgS,"#e2e8f0"],["平均±Par",Number(avgD)>=0 ? "+"+avgD : avgD,Number(avgD)<=0 ? "#4ade80" : "#f87171"],["ラウンド数",tR,"#63b3ed"]].map(([label,val,color]) => (
                    <div key={label} style={{ textAlign:"center", background:"rgba(255,255,255,0.03)", borderRadius:"10px", padding:"0.7rem 0.3rem" }}>
                      <div style={{ color:"#6b7280", fontSize:"0.62rem", marginBottom:"0.3rem" }}>{label}</div>
                      <div style={{ fontSize:"1.5rem", color, fontWeight:700 }}>{val}</div>
                    </div>
                  ))}
                </div>
              </div>
              <ParAvgBlock parAvgs={calcParAvg(aHoles, aPars)} />
              <RatingBarBlock counts={atee45s.counts} total={atee45s.total} label="ティーショット評価（Par4・5）累計" />
              <RatingBarBlock counts={asec45s.counts} total={asec45s.total} label="セカンドショット評価（Par4・5）累計" />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.5rem", marginBottom:"0.5rem" }}>
                {[["ボギーオン以上率",abopR,"#38bdf8"],["ボギーオン率",aborR,"#63b3ed"]].map(([label,rate,color]) => (
                  <div key={label} style={{ textAlign:"center", background:"rgba(255,255,255,0.03)", border:"1px solid "+color+"33", borderRadius:"10px", padding:"0.7rem 0.3rem" }}>
                    <div style={{ color, fontSize:"0.6rem", fontWeight:700, marginBottom:"0.3rem" }}>{label}</div>
                    <div style={{ fontSize:"1.5rem", color, fontWeight:700 }}>{rate}%</div>
                  </div>
                ))}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.5rem", marginBottom:"1rem" }}>
                {[["ダブルボギー以上",adblR,"#f87171"],["3パット率",atpR,"#fb923c"]].map(([label,rate,color]) => (
                  <div key={label} style={{ textAlign:"center", background:"rgba(255,255,255,0.03)", border:"1px solid "+color+"33", borderRadius:"10px", padding:"0.7rem 0.3rem" }}>
                    <div style={{ color, fontSize:"0.6rem", fontWeight:700, marginBottom:"0.3rem" }}>{label}</div>
                    <div style={{ fontSize:"1.5rem", color, fontWeight:700 }}>{rate}%</div>
                  </div>
                ))}
              </div>
              <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
                <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.8rem" }}>パーオン / パット</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.6rem", marginBottom:"0.8rem" }}>
                  <div style={{ textAlign:"center", background:"rgba(74,222,128,0.06)", border:"1px solid rgba(74,222,128,0.2)", borderRadius:"10px", padding:"0.7rem" }}>
                    <div style={{ color:"#4ade80", fontSize:"0.68rem", fontWeight:700, marginBottom:"0.3rem" }}>パーオン率</div>
                    <div style={{ fontSize:"1.8rem", color:"#4ade80", fontWeight:700 }}>{(tParOn/tR).toFixed(1)}<span style={{ fontSize:"1rem" }}>/18</span></div>
                    <div style={{ color:"#4ade80", fontSize:"0.75rem", opacity:0.8 }}>{poPct}%</div>
                  </div>
                  <div style={{ textAlign:"center", background:"rgba(167,139,250,0.06)", border:"1px solid rgba(167,139,250,0.2)", borderRadius:"10px", padding:"0.7rem" }}>
                    <div style={{ color:"#a78bfa", fontSize:"0.68rem", fontWeight:700, marginBottom:"0.3rem" }}>平均パット数/R</div>
                    <div style={{ fontSize:"1.8rem", color:"#a78bfa", fontWeight:700 }}>{(tPutts/tR).toFixed(1)}</div>
                  </div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0.5rem" }}>
                  {[["平均パット",avgPA,"#e2e8f0"],["GIR時",avgPGIR,"#4ade80"],["非GIR時",avgPNGIR,"#f87171"]].map(([label,val,color]) => (
                    <div key={label} style={{ textAlign:"center", background:"rgba(255,255,255,0.03)", borderRadius:"8px", padding:"0.5rem" }}>
                      <div style={{ color:"#6b7280", fontSize:"0.62rem", marginBottom:"0.2rem" }}>{label}</div>
                      <div style={{ fontSize:"1.3rem", color, fontWeight:700 }}>{val}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
                <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.7rem" }}>ショット評価(累計)</div>
                <div style={{ display:"flex", gap:"0.5rem" }}>
                  {RATINGS.map(r => {
                    const total = RATINGS.reduce((s,rr) => s+aRC[rr], 0);
                    const pct = total>0 ? Math.round((aRC[r]/total)*100) : 0;
                    return (
                      <div key={r} style={{ flex:1, textAlign:"center" }}>
                        <div style={{ color:RC[r], fontSize:"1.1rem", marginBottom:"0.2rem" }}>{r}</div>
                        <div style={{ fontSize:"1.6rem", color:RC[r], fontWeight:700 }}>{aRC[r]}</div>
                        <div style={{ fontSize:"0.65rem", color:RC[r], opacity:0.8 }}>{pct}%</div>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
                <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.7rem" }}>番手使用回数(累計)</div>
                {CLUBS.map(c => {
                  const cnt = aShots.filter(s => s.club===c).length;
                  if (cnt===0) return null;
                  const mx = Math.max(...CLUBS.map(cc => aShots.filter(s => s.club===cc).length));
                  return (
                    <div key={c} style={{ marginBottom:"0.4rem", display:"flex", alignItems:"center", gap:"0.5rem" }}>
                      <span style={{ width:"2.5rem", fontSize:"0.78rem", color:"#9ca3af" }}>{c}</span>
                      <div style={{ flex:1, height:"8px", background:"rgba(255,255,255,0.08)", borderRadius:"4px", overflow:"hidden" }}>
                        <div style={{ width:(cnt/mx*100)+"%", height:"100%", background:"#63b3ed", borderRadius:"4px" }} />
                      </div>
                      <span style={{ fontSize:"0.78rem", color:"#e2e8f0", width:"1.5rem", textAlign:"right" }}>{cnt}</span>
                    </div>
                  );
                })}
              </div>
              {(() => {
                const uClubs = CLUBS.filter(c => aShots.some(s => s.club===c && s.rating));
                if (uClubs.length===0) return null;
                return (
                  <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
                    <div style={{ color:"#9ca3af", fontSize:"0.72rem", letterSpacing:"0.1em", marginBottom:"0.8rem" }}>番手別ショット評価(累計)</div>
                    <div style={{ display:"grid", gridTemplateColumns:"2.5rem 1fr 1fr 1fr", gap:"0.3rem", marginBottom:"0.4rem" }}>
                      <span />
                      {RATINGS.map(r => <div key={r} style={{ textAlign:"center", fontSize:"0.75rem", color:RC[r], fontWeight:700 }}>{r}</div>)}
                    </div>
                    {uClubs.map(c => {
                      const shots = aShots.filter(s => s.club===c && s.rating);
                      const tot = shots.length;
                      return (
                        <div key={c} style={{ display:"grid", gridTemplateColumns:"2.5rem 1fr 1fr 1fr", gap:"0.3rem", marginBottom:"0.35rem", alignItems:"center" }}>
                          <span style={{ fontSize:"0.75rem", color:"#9ca3af", fontWeight:600 }}>{c}</span>
                          {RATINGS.map(r => {
                            const cnt = shots.filter(s => s.rating===r).length;
                            const pct = tot>0 ? Math.round((cnt/tot)*100) : 0;
                            return (
                              <div key={r} style={{ textAlign:"center" }}>
                                <div style={{ padding:"0.2rem 0", borderRadius:"6px", background:cnt>0 ? RC[r]+"22" : "transparent", border:cnt>0 ? "1px solid "+RC[r]+"44" : "1px solid transparent" }}>
                                  <div style={{ fontSize:"1rem", color:cnt>0 ? RC[r] : "#374151", fontWeight:700 }}>{cnt>0 ? cnt : "-"}</div>
                                  {cnt>0 && <div style={{ fontSize:"0.55rem", color:RC[r], opacity:0.7 }}>{pct}%</div>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
              {rounds.length >= 2 && <TrendGraph rounds={rounds} activeMetric={activeMetric} setActiveMetric={setActiveMetric} />}
            </div>
          );
        })()}
      </div>
    </div>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GolfApp />);
  </script>
</body>
</html>
